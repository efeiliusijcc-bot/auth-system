server {
    listen 80;
    server_name auth.company.test-link.xin auth-admin.test-link.xin openclaw.company.test-link.xin;

    location / {
        proxy_pass https://127.0.0.1:18443;
        proxy_ssl_verify off;
        proxy_buffer_size 32k;
        proxy_buffers 8 64k;
        proxy_busy_buffers_size 128k;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }
}

server {
    listen 443 ssl http2;
    server_name auth.company.test-link.xin auth-admin.test-link.xin openclaw.company.test-link.xin;

    ssl_certificate /etc/letsencrypt/live/auth.company.test-link.xin/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/auth.company.test-link.xin/privkey.pem;

    location / {
        proxy_pass https://127.0.0.1:18443;
        proxy_ssl_verify off;
        proxy_buffer_size 32k;
        proxy_buffers 8 64k;
        proxy_busy_buffers_size 128k;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }
}
