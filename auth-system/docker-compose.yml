services:
  postgres:
    image: postgres:16-alpine
    container_name: auth-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - auth-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    container_name: auth-keycloak
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_HOSTNAME: https://${AUTH_DOMAIN}
      KC_HOSTNAME_ADMIN: https://${AUTH_ADMIN_DOMAIN}
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    command: ["start", "--import-realm"]
    volumes:
      - ./keycloak/realm-export:/opt/keycloak/data/import:ro
    networks:
      - auth-internal
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000; printf 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3; grep -q '200' <&3"]
      interval: 15s
      timeout: 5s
      retries: 20

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.8.1
    container_name: auth-oauth2-proxy
    restart: unless-stopped
    depends_on:
      keycloak:
        condition: service_healthy
    command:
      - --provider=keycloak-oidc
      - --client-id=${KEYCLOAK_CLIENT_ID}
      - --client-secret=${KEYCLOAK_CLIENT_SECRET}
      - --redirect-url=https://${OPENCLAW_DOMAIN}/oauth2/callback
      - --oidc-issuer-url=https://${AUTH_DOMAIN}/realms/company
      - --email-domain=*
      - --allowed-group=/openclaw-users
      - --http-address=0.0.0.0:4180
      - --reverse-proxy=true
      - --set-xauthrequest=true
      - --pass-authorization-header=false
      - --pass-access-token=false
      - --pass-user-headers=true
      - --cookie-secure=true
      - --cookie-httponly=true
      - --cookie-samesite=lax
      - --cookie-secret=${OAUTH2_PROXY_COOKIE_SECRET}
      - --cookie-name=_openclaw_oauth2
      - --cookie-domain=${OPENCLAW_DOMAIN}
      - --whitelist-domain=.${OPENCLAW_DOMAIN}
      - --ssl-insecure-skip-verify=${OAUTH2_PROXY_SSL_INSECURE_SKIP_VERIFY}
      - --skip-provider-button=true
    networks:
      auth-internal:
        aliases:
          - oauth2-proxy.local
    extra_hosts:
      - "${AUTH_DOMAIN}:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4180/ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  nginx:
    image: nginx:1.27-alpine
    container_name: auth-nginx
    restart: unless-stopped
    depends_on:
      oauth2-proxy:
        condition: service_healthy
    environment:
      AUTH_DOMAIN: ${AUTH_DOMAIN}
      AUTH_ADMIN_DOMAIN: ${AUTH_ADMIN_DOMAIN}
      OPENCLAW_DOMAIN: ${OPENCLAW_DOMAIN}
      OPENCLAW_UPSTREAM: ${OPENCLAW_UPSTREAM}
      TLS_CERT_FILE: ${TLS_CERT_FILE}
      TLS_KEY_FILE: ${TLS_KEY_FILE}
      ADMIN_ALLOWED_CIDR: ${ADMIN_ALLOWED_CIDR}
    ports:
      - "${HTTP_PORT}:80"
      - "${HTTPS_PORT}:443"
    volumes:
      - ./nginx/templates:/etc/nginx/templates:ro
      - ./nginx/snippets:/etc/nginx/snippets:ro
      - ./certs:/etc/nginx/certs:ro
      - nginx-logs:/var/log/nginx
    networks:
      auth-internal:
        aliases:
          - ${AUTH_DOMAIN}
          - ${AUTH_ADMIN_DOMAIN}
          - ${OPENCLAW_DOMAIN}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10

networks:
  auth-internal:
    driver: bridge

volumes:
  postgres-data:
  nginx-logs:

